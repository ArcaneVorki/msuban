<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Top 5000 Player Ban Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #262a33;
    --text: #e6e8ec;
    --muted: #9aa1ad;
    --red: #ef4444;
    --green: #22c55e;
    --amber: #f59e0b;
    --accent: #6366f1;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    margin: 0;
    padding: 24px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
  .card .value { font-size: 28px; font-weight: 600; margin-top: 4px; }
  .card .value.red { color: var(--red); }
  .card .value.green { color: var(--green); }
  .card .value.amber { color: var(--amber); }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 24px;
  }
  .panel h2 { font-size: 14px; margin: 0 0 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; }
  #bannedTableWrap td, #previousBannedTableWrap td { font-size: 26px; padding: 12px 14px; }
  tr:hover td { background: #1d212b; }
  .pill { padding: 4px 14px; border-radius: 999px; font-size: 22px; font-weight: 600; }
  .pill.banned { background: rgba(245,158,11,0.18); color: var(--amber); }
  .pill.perm { background: rgba(239,68,68,0.25); color: var(--red); }
  .pill.ok { background: rgba(34,197,94,0.15); color: var(--green); }
  .pill.repeat { background: rgba(99,102,241,0.18); color: #a5a8ff; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 24px; }
  .empty { color: var(--muted); padding: 24px; text-align: center; }
  canvas { max-height: 320px; }
  .char-cell { display: flex; align-items: center; gap: 14px; }
  .char-avatar-frame {
    width: 72px;
    height: 72px;
    border-radius: 12px;
    background: #0f1115;
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }
  .char-avatar-frame img.char-avatar {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 170%;
    height: 170%;
    transform: translate(-50%, -50%);
    object-fit: cover;
  }
  .char-avatar-frame .char-avatar.placeholder {
    position: static;
    width: 100%;
    height: 100%;
    transform: none;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 20px;
  }
  .char-name { font-weight: 600; font-size: 26px; }
  .char-extra { color: var(--muted); font-size: 22px; }
  .char-link { color: inherit; text-decoration: none; }
  .char-link:hover .char-name { text-decoration: underline; color: var(--accent); }

  .tab-bar { display: flex; gap: 4px; margin-bottom: 12px; }
  .tab-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    cursor: pointer;
  }
  .tab-btn.active {
    background: rgba(99,102,241,0.15);
    border-color: var(--accent);
    color: #c7c9ff;
  }

  .footnote { color: var(--muted); font-size: 11px; margin: -8px 0 24px; }

  .banner {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px 0 4px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
  .banner-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    border: 1px solid var(--border);
  }
  .banner-btn.donate { background: rgba(34,197,94,0.12); color: var(--green); border-color: rgba(34,197,94,0.3); }
  .banner-btn.donate:hover { background: rgba(34,197,94,0.2); }
  .banner-btn.subscribe { background: rgba(239,68,68,0.12); color: var(--red); border-color: rgba(239,68,68,0.3); }
  .banner-btn.subscribe:hover { background: rgba(239,68,68,0.2); }
</style>
</head>
<body>

<h1>Top 5000 Player Ban Tracker</h1>
<div class="subtitle" id="subtitle">Loading data…</div>

<div class="cards" id="cards"></div>

<div class="panel">
  <h2>Banned addresses over time</h2>
  <canvas id="historyChart"></canvas>
</div>

<div class="panel">
  <div class="tab-bar">
    <button class="tab-btn active" id="tabCurrentBtn" onclick="switchTab('current')">Currently banned addresses</button>
    <button class="tab-btn" id="tabPreviousBtn" onclick="switchTab('previous')">Previously banned addresses</button>
  </div>
  <div id="bannedTableWrap"></div>
  <div id="previousBannedTableWrap" style="display:none;"></div>
  <div class="footnote">* History only tracks active bans since Jul 18, 2026. Previous bans (before that date) are not tracked.</div>
</div>

<div class="banner">
  <a class="banner-btn donate" href="ethereum:0xCfA397cCF402cAedbd595F7dA8C39E8e919820EA" onclick="copyDonateAddress(event)" title="0xCfA397cCF402cAedbd595F7dA8C39E8e919820EA">Click here to Donate</a>
  <a class="banner-btn subscribe" href="https://www.youtube.com/@arcanevorki" target="_blank" rel="noopener noreferrer">Sub to uTube</a>
</div>

<script>
async function loadJSON(path) {
  // GitHub Pages fronts everything with a CDN cache, so a plain fetch can
  // serve a stale copy for a while after a push. Bust both the CDN cache
  // (query param) and the browser cache (no-store) on every load.
  const bustedPath = `${path}?t=${Date.now()}`;
  const res = await fetch(bustedPath, { cache: "no-store" });
  if (!res.ok) throw new Error(`Failed to load ${path}: ${res.status}`);
  return res.json();
}

function fmtDate(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleString();
}

function daysUntil(iso) {
  if (!iso) return null;
  const diff = new Date(iso).getTime() - Date.now();
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function formatNumber(val) {
  const n = Number(val);
  if (Number.isNaN(n)) return String(val);
  return n.toLocaleString();
}

function charPageUrl(characterAssetKey) {
  return `https://msu.io/navigator/character/${characterAssetKey}`;
}

// Renders one table row. `ban` is { isPermanentBan, banStartAt, banEndAt, isActive }.
// `isActive` controls whether we show a "days left" countdown (current bans) or not (past bans).
function renderAddressRow(address, ban, walletToPlayers, banHistory) {
  const matches = walletToPlayers[address] || [];
  const top = matches[0] || null;
  const extraCount = matches.length > 1 ? matches.length - 1 : 0;

  const avatarHtml = top?.imageUrl
    ? `<div class="char-avatar-frame"><img class="char-avatar" src="${top.imageUrl}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.outerHTML='<div class=&quot;char-avatar placeholder&quot;>?</div>'" /></div>`
    : `<div class="char-avatar-frame"><div class="char-avatar placeholder">?</div></div>`;

  const charCell = top
    ? `
      <a class="char-link" href="${charPageUrl(top.characterAssetKey)}" target="_blank" rel="noopener noreferrer">
        <div class="char-cell">
          ${avatarHtml}
          <div>
            <div class="char-name">${escapeHtml(top.characterName || "Unknown")}</div>
            <div class="char-extra">Rank #${top.rank ?? "—"}${extraCount ? ` · +${extraCount} more` : ""}</div>
          </div>
        </div>
      </a>
    `
    : `<span class="char-extra">No character match</span>`;

  const attackPower = top?.attackPower ? formatNumber(top.attackPower) : "—";

  const histEntry = banHistory[address];
  const timesBanned = histEntry?.timesBanned || 1;
  const repeatBadge = timesBanned > 1
    ? `<span class="pill repeat">Repeat ×${timesBanned}</span>`
    : `<span class="char-extra">First offense</span>`;

  const dLeft = ban.isActive ? daysUntil(ban.banEndAt) : null;

  return `
    <tr>
      <td>${charCell}</td>
      <td class="mono">${address}</td>
      <td>${attackPower}</td>
      <td>${repeatBadge}</td>
      <td><span class="pill ${ban.isPermanentBan ? "perm" : "banned"}">
        ${ban.isPermanentBan ? "Permanent" : "Temporary"}
      </span></td>
      <td>${fmtDate(ban.banStartAt)}</td>
      <td>${ban.isPermanentBan ? "—" : fmtDate(ban.banEndAt)}</td>
      <td>${ban.isActive ? (ban.isPermanentBan ? "—" : (dLeft !== null ? `${dLeft}d` : "—")) : "—"}</td>
    </tr>
  `;
}

function switchTab(tab) {
  const currentWrap = document.getElementById("bannedTableWrap");
  const previousWrap = document.getElementById("previousBannedTableWrap");
  const currentBtn = document.getElementById("tabCurrentBtn");
  const previousBtn = document.getElementById("tabPreviousBtn");
  if (tab === "current") {
    currentWrap.style.display = "";
    previousWrap.style.display = "none";
    currentBtn.classList.add("active");
    previousBtn.classList.remove("active");
  } else {
    currentWrap.style.display = "none";
    previousWrap.style.display = "";
    currentBtn.classList.remove("active");
    previousBtn.classList.add("active");
  }
}

function copyDonateAddress(event) {
  const address = "0xCfA397cCF402cAedbd595F7dA8C39E8e919820EA";
  if (navigator.clipboard) {
    navigator.clipboard.writeText(address).then(() => {
      const btn = event.currentTarget;
      const original = btn.textContent;
      btn.textContent = "Address copied!";
      setTimeout(() => { btn.textContent = original; }, 1500);
    }).catch(() => {});
  }
  // Let the ethereum: link also attempt to fire for wallet-extension users;
  // don't preventDefault so both behaviors can happen.
}

async function main() {
  let manifest, latest;
  try {
    manifest = await loadJSON("data/manifest.json");
    latest = await loadJSON("data/latest.json");
  } catch (err) {
    document.getElementById("cards").innerHTML =
      `<div class="empty">No data yet. Once the daily GitHub Action runs at least once, results will show up here.</div>`;
    document.getElementById("subtitle").textContent = "Waiting for first run…";
    return;
  }

  document.getElementById("subtitle").textContent =
    `Last checked: ${fmtDate(latest.checkedAt)} · ${latest.totalAddresses} addresses tracked`;

  // --- Player/wallet lookup (image, attack power) — optional, may not exist yet ---
  let walletToPlayers = {};
  try {
    const players = await loadJSON("data/players.json");
    for (const p of players) {
      if (!p.walletAddr) continue;
      if (!walletToPlayers[p.walletAddr]) walletToPlayers[p.walletAddr] = [];
      walletToPlayers[p.walletAddr].push(p);
    }
    // players.json is rank-sorted already, but sort defensively per wallet just in case
    for (const addr in walletToPlayers) {
      walletToPlayers[addr].sort((a, b) => a.rank - b.rank);
    }
  } catch (err) {
    // No players.json yet — table will just show addresses without character info
  }

  // --- Ban history lookup (repeat-offender counts) — optional, may not exist yet ---
  let banHistory = {};
  try {
    banHistory = await loadJSON("data/ban-history.json");
  } catch (err) {
    // No ban-history.json yet — repeat-offender badge just won't show
  }

  // --- Summary cards ---
  const results = latest.results || [];
  const banned = results.filter(r => r.banInfo?.banned);
  const permanent = banned.filter(r => r.banInfo?.isPermanentBan);
  const temporary = banned.filter(r => r.banInfo && !r.banInfo.isPermanentBan);
  const errors = results.filter(r => r.error);
  const repeatOffenderCount = Object.values(banHistory).filter(e => e.timesBanned > 1).length;

  const cards = [
    { label: "Total addresses", value: results.length, cls: "" },
    { label: "Currently banned", value: banned.length, cls: "red" },
    { label: "Permanent bans", value: permanent.length, cls: "red" },
    { label: "Temporary bans", value: temporary.length, cls: "amber" },
    { label: "Repeat offenders", value: repeatOffenderCount, cls: repeatOffenderCount ? "amber" : "" },
    { label: "Clean", value: results.length - banned.length, cls: "green" },
    { label: "Errors", value: errors.length, cls: errors.length ? "amber" : "" },
  ];
  document.getElementById("cards").innerHTML = cards.map(c => `
    <div class="card">
      <div class="label">${c.label}</div>
      <div class="value ${c.cls}">${c.value}</div>
    </div>
  `).join("");

  // --- History chart (loads each day in the manifest) ---
  const historyDates = manifest.slice(-90); // cap at last 90 days for perf
  const historyRecords = await Promise.all(
    historyDates.map(d => loadJSON(`data/history/${d}.json`).catch(() => null))
  );

  const labels = [];
  const bannedCounts = [];
  const permCounts = [];
  historyRecords.forEach((rec, i) => {
    if (!rec) return;
    labels.push(historyDates[i]);
    const b = rec.results.filter(r => r.banInfo?.banned);
    bannedCounts.push(b.length);
    permCounts.push(b.filter(r => r.banInfo?.isPermanentBan).length);
  });

  try {
    new Chart(document.getElementById("historyChart"), {
      type: "line",
      data: {
        labels,
        datasets: [
          {
            label: "Total banned",
            data: bannedCounts,
            borderColor: "#ef4444",
            backgroundColor: "rgba(239,68,68,0.1)",
            tension: 0.25,
            fill: true,
          },
          {
            label: "Permanent bans",
            data: permCounts,
            borderColor: "#f59e0b",
            backgroundColor: "rgba(245,158,11,0.08)",
            tension: 0.25,
            fill: true,
          },
        ],
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: "#e6e8ec" } } },
        scales: {
          x: { ticks: { color: "#9aa1ad" }, grid: { color: "#262a33" } },
          y: { ticks: { color: "#9aa1ad" }, grid: { color: "#262a33" }, beginAtZero: true },
        },
      },
    });
  } catch (err) {
    console.error("Chart rendering failed:", err);
    document.getElementById("historyChart").outerHTML =
      `<div class="empty">Chart failed to render: ${err.message}</div>`;
  }

  // --- Currently banned addresses table ---
  if (banned.length === 0) {
    document.getElementById("bannedTableWrap").innerHTML =
      `<div class="empty">No banned addresses right now.</div>`;
  } else {
    const rows = banned.map(r => renderAddressRow(
      r.address,
      { isPermanentBan: r.banInfo.isPermanentBan, banStartAt: r.banInfo.banStartAt, banEndAt: r.banInfo.banEndAt, isActive: true },
      walletToPlayers,
      banHistory
    )).join("");

    document.getElementById("bannedTableWrap").innerHTML = `
      <table>
        <thead>
          <tr><th>Character</th><th>Address</th><th>Combat Power</th><th>History*</th><th>Type</th><th>Banned since</th><th>Ends</th><th>Days left</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  // --- Previously banned addresses table (bans that have since expired) ---
  const currentlyBannedSet = new Set(banned.map(r => r.address));
  const previouslyBanned = Object.entries(banHistory)
    .filter(([addr, entry]) => !currentlyBannedSet.has(addr) && entry.periods && entry.periods.length > 0)
    .map(([addr, entry]) => ({ address: addr, lastPeriod: entry.periods[entry.periods.length - 1] }));

  if (previouslyBanned.length === 0) {
    document.getElementById("previousBannedTableWrap").innerHTML =
      `<div class="empty">No previously-banned addresses recorded yet.</div>`;
  } else {
    const rows = previouslyBanned.map(({ address, lastPeriod }) => renderAddressRow(
      address,
      { isPermanentBan: lastPeriod.isPermanentBan, banStartAt: lastPeriod.banStartAt, banEndAt: lastPeriod.banEndAt, isActive: false },
      walletToPlayers,
      banHistory
    )).join("");

    document.getElementById("previousBannedTableWrap").innerHTML = `
      <table>
        <thead>
          <tr><th>Character</th><th>Address</th><th>Combat Power</th><th>History*</th><th>Type</th><th>Banned since</th><th>Ended</th><th>Days left</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }
}

main();
</script>
</body>
</html>

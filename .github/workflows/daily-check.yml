name: Daily Wallet Ban Check

on:
  schedule:
    # Runs at 13:00 UTC every day — adjust to whatever time works for you
    - cron: "0 13 * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run ban check
        run: node scripts/fetch.js

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Daily ban check: $(date -u +%Y-%m-%d)"
          git push
